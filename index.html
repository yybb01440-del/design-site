<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>设计接单</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,700;9..40,900&family=Noto+Serif+SC:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,700;1,400;1,700&family=Bebas+Neue&family=Noto+Sans+SC:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style data-page="shell">
#shell-cover {
  position: fixed; inset: 0;
  background: #000; z-index: 9998;
  pointer-events: none; opacity: 0;
  transition: opacity .35s ease;
}
#shell-cover.on { opacity: 1; pointer-events: all; }
#shell-nav {
  position: fixed; bottom: 28px; top: auto; left: 50%;
  transform: translateX(-50%); z-index: 9990;
  display: flex; gap: 2px; width: auto; justify-content: center;
  background: rgba(8,8,8,0.88);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 100px; padding: 6px;
}
.sn-btn {
  font-family: 'Space Mono', monospace;
  font-size: 9px; letter-spacing: .22em; text-transform: uppercase;
  color: rgba(255,255,255,0.38); background: none; border: none;
  cursor: pointer; padding: 8px 18px; border-radius: 100px;
  transition: color .25s, background .25s; white-space: nowrap;
}
.sn-btn:hover { color: rgba(255,255,255,0.7); }
.sn-btn.active { color: #fff; background: rgba(255,255,255,0.1); }
#mount { min-height: 100vh; padding-bottom: 90px; }
</style>

<style data-page="home" media="not all">
:root {
  --bg: #0c0c0c;
  --text: #e9e9e0;
  --text-dim: rgba(233,233,224,0.45);
  --accent: #4a9aaa;
  --accent-dim: rgba(74,154,170,0.12);
  --border: rgba(233,233,224,0.08);
  --font-display: 'DM Serif Display', Georgia, serif;
  --font-body: 'DM Sans', system-ui, sans-serif;
  --font-mono: 'Space Mono', monospace;
}

*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 16px;
  line-height: 1.6;
  overflow-x: hidden;
  cursor: none;
}

/* Grain */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 1000;
  pointer-events: none;
  opacity: 0.035;
  mix-blend-mode: overlay;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
}

/* Progress */
#progress {
  position: fixed; top: 0; left: 0; height: 2px;
  background: var(--accent); width: 0%; z-index: 999;
}

/* Cursor */
#cur-dot {
  position: fixed; pointer-events: none; z-index: 9999;
  width: 5px; height: 5px;
  background: var(--accent); border-radius: 50%;
  transform: translate(-50%,-50%);
}
#cur-ring {
  position: fixed; pointer-events: none; z-index: 9998;
  width: 36px; height: 36px;
  border: 1px solid var(--text); border-radius: 50%;
  transform: translate(-50%,-50%);
  mix-blend-mode: difference;
  transition: width .3s cubic-bezier(.16,1,.3,1), height .3s cubic-bezier(.16,1,.3,1);
}

/* Nav */
nav {
  position: fixed; top: 0; width: 100%; z-index: 100;
  padding: 22px 48px;
  display: flex; justify-content: space-between; align-items: center;
}
.nav-brand {
  font-family: var(--font-mono);
  font-size: 10px; letter-spacing: .3em; text-transform: uppercase;
  color: var(--text-dim);
}
.nav-cta {
  font-family: var(--font-mono);
  font-size: 10px; letter-spacing: .2em; text-transform: uppercase;
  color: var(--accent); text-decoration: none;
  border-bottom: 1px solid var(--accent); padding-bottom: 2px;
}

/* Reveal */
.rv {
  opacity: 0; transform: translateY(22px);
  transition: opacity .85s cubic-bezier(.18,.62,.18,1),
              transform .85s cubic-bezier(.18,.62,.18,1);
}
.rv.on { opacity: 1; transform: none; }

/* ─── HERO ─── */
.hero {
  min-height: 100svh;
  display: flex; flex-direction: column; justify-content: center;
  padding: 120px 60px 80px;
  position: relative;
}
.hero-eyebrow {
  font-family: var(--font-mono);
  font-size: 10px; letter-spacing: .4em; text-transform: uppercase;
  color: var(--text-dim); margin-bottom: 36px;
}
.hero-title {
  font-family: var(--font-display);
  font-size: clamp(60px, 9.5vw, 148px);
  line-height: 1.02; letter-spacing: -.025em;
  margin-bottom: 48px;
}
.hero-title em { font-style: italic; color: var(--accent); }
.hero-body {
  font-size: 16px; color: var(--text-dim);
  max-width: 420px; line-height: 1.85;
  margin-bottom: 52px;
}
.hero-btn {
  display: inline-block;
  font-family: var(--font-mono); font-size: 11px;
  letter-spacing: .2em; text-transform: uppercase;
  color: var(--bg); background: var(--text);
  padding: 14px 30px; text-decoration: none;
  transition: background .2s;
}
.hero-btn:hover { background: var(--accent); }
.hero-scroll {
  position: absolute; bottom: 44px; left: 60px;
  font-family: var(--font-mono); font-size: 10px;
  letter-spacing: .3em; text-transform: uppercase;
  color: var(--text-dim);
  display: flex; align-items: center; gap: 10px;
}
.hero-scroll::before {
  content: ''; display: block;
  width: 36px; height: 1px; background: var(--text-dim);
}
.bob { animation: bob 2.4s ease-in-out infinite; }
@keyframes bob {
  0%,100%{transform:translateY(0)} 50%{transform:translateY(5px)}
}

/* ─── SECTION HEADER ─── */
.sh {
  padding: 120px 60px 0;
  margin-bottom: 56px;
}
.sh-label {
  font-family: var(--font-mono); font-size: 10px;
  letter-spacing: .45em; text-transform: uppercase;
  color: var(--accent); margin-bottom: 14px;
}
.sh-title {
  font-family: var(--font-display);
  font-size: clamp(40px, 5vw, 70px);
  letter-spacing: -.02em;
}

/* ══════════════════════════════════
   SERVICE 1: 网页设计
   Block is styled AS a web UI
══════════════════════════════════ */
.svc-web { padding: 0 60px 120px; }

.web-demo {
  background: #161616;
  border: 1px solid var(--border);
  border-radius: 8px; overflow: hidden;
  max-width: 880px;
}
.browser-bar {
  background: #202020;
  padding: 11px 16px;
  display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid var(--border);
}
.b-dots { display: flex; gap: 6px; }
.b-dot { width: 10px; height: 10px; border-radius: 50%; }
.b-dot:nth-child(1){background:#ff5f57}
.b-dot:nth-child(2){background:#febc2e}
.b-dot:nth-child(3){background:#28c840}
.b-url {
  flex: 1;
  background: #2a2a2a; border-radius: 4px;
  padding: 5px 12px;
  font-family: var(--font-mono); font-size: 11px;
  color: var(--text-dim);
}
.mock-nav-bar {
  padding: 14px 24px;
  display: flex; justify-content: space-between; align-items: center;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.mock-logo {
  font-family: var(--font-display); font-style: italic; font-size: 18px;
}
.mock-links { display: flex; gap: 22px; }
.mock-link { font-size: 12px; color: var(--text-dim); }

.mock-hero {
  padding: 40px 24px;
  display: grid; grid-template-columns: 1fr 1fr; gap: 32px; align-items: center;
}
.mock-badge {
  display: inline-block;
  background: var(--accent-dim); color: var(--accent);
  font-family: var(--font-mono); font-size: 9px;
  letter-spacing: .2em; text-transform: uppercase;
  padding: 4px 10px; margin-bottom: 14px;
}
.mock-h1 {
  font-family: var(--font-display); font-size: 28px;
  line-height: 1.1; margin-bottom: 10px;
}
.mock-p { font-size: 12px; color: var(--text-dim); line-height: 1.65; margin-bottom: 18px; }
.mock-cta {
  display: inline-block;
  background: var(--accent); color: #0c0c0c;
  font-family: var(--font-mono); font-size: 10px;
  letter-spacing: .15em; text-transform: uppercase;
  padding: 9px 18px;
}
.mock-visual {
  background: var(--accent-dim);
  border: 1px solid rgba(212,168,83,.18);
  height: 130px; border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
}
.mock-visual span {
  font-family: var(--font-mono); font-size: 9px;
  letter-spacing: .3em; text-transform: uppercase; color: rgba(212,168,83,.3);
}
.mock-cards {
  padding: 0 24px 28px;
  display: grid; grid-template-columns: repeat(3,1fr); gap: 10px;
}
.mock-card {
  background: rgba(255,255,255,.025);
  border: 1px solid var(--border);
  border-radius: 4px; padding: 14px;
}
.mc-icon {
  width: 24px; height: 24px;
  background: var(--accent-dim); border-radius: 3px;
  margin-bottom: 10px;
}
.mc-title { font-size: 12px; font-weight: 700; margin-bottom: 5px; }
.mc-text { font-size: 10px; color: var(--text-dim); line-height: 1.5; }

.svc-info {
  margin-top: 28px; max-width: 880px;
  display: flex; justify-content: space-between; align-items: flex-end; gap: 32px;
}
.svc-desc { font-size: 15px; color: var(--text-dim); line-height: 1.85; max-width: 540px; }
.price-box { text-align: right; flex-shrink: 0; }
.price-lbl {
  font-family: var(--font-mono); font-size: 9px;
  letter-spacing: .3em; text-transform: uppercase;
  color: var(--text-dim); margin-bottom: 4px;
}
.price-val {
  font-family: var(--font-display); font-size: 38px;
}
.price-note {
  font-family: var(--font-mono); font-size: 9px;
  color: var(--text-dim); margin-top: 4px;
}

/* ══════════════════════════════════
   SERVICE 2: 海报设计
   Block IS a poster composition
══════════════════════════════════ */
.svc-poster {
  display: grid; grid-template-columns: 1fr 1fr;
  min-height: 90vh;
  overflow: hidden;
}
.poster-left {
  background: var(--text); color: var(--bg);
  padding: 80px 60px;
  display: flex; flex-direction: column; justify-content: space-between;
  position: relative; overflow: hidden;
}
.poster-bg-word {
  position: absolute;
  font-family: var(--font-display); font-style: italic;
  font-size: 32vw; color: rgba(12,12,12,.05);
  top: 50%; left: 50%; transform: translate(-50%,-50%);
  white-space: nowrap; pointer-events: none; line-height: 1;
  user-select: none;
}
.poster-num {
  font-family: var(--font-mono); font-size: 10px;
  letter-spacing: .3em; text-transform: uppercase;
  color: rgba(12,12,12,.4); margin-bottom: 20px;
  position: relative; z-index: 1;
}
.poster-big {
  font-family: var(--font-display);
  font-size: clamp(72px, 7.5vw, 120px);
  line-height: .95; letter-spacing: -.03em;
  position: relative; z-index: 1;
}
.poster-footer-left { position: relative; z-index: 1; }
.poster-desc {
  font-size: 14px; line-height: 1.75;
  color: rgba(12,12,12,.65);
  max-width: 300px; margin-bottom: 22px;
}
.poster-price {
  font-family: var(--font-display); font-size: 48px;
  letter-spacing: -.02em;
}
.poster-price sup {
  font-family: var(--font-mono); font-size: 11px;
  letter-spacing: .15em; vertical-align: super;
  color: rgba(12,12,12,.4);
}

.poster-right {
  background: #111;
  padding: 80px 60px;
  display: flex; flex-direction: column; justify-content: center; gap: 36px;
}
.pf {
  border-top: 1px solid var(--border); padding-top: 20px;
}
.pf-label {
  font-family: var(--font-mono); font-size: 9px;
  letter-spacing: .4em; text-transform: uppercase;
  color: var(--accent); margin-bottom: 8px;
}
.pf-text { font-size: 14px; color: var(--text-dim); line-height: 1.7; }

/* ══════════════════════════════════
   SERVICE 3: 平面设计
   Block styled as brand / flat design system
══════════════════════════════════ */
.svc-flat { padding: 0 60px 120px; }

.flat-demo {
  background: #f4f2ed; color: #111;
  padding: 56px;
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  grid-auto-rows: auto;
  gap: 20px;
}
.fd-label {
  grid-column: 1 / 8; grid-row: 1;
  font-family: var(--font-mono); font-size: 9px;
  letter-spacing: .45em; text-transform: uppercase;
  color: rgba(17,17,17,.4);
  display: flex; align-items: center; gap: 10px;
  align-self: end;
}
.fd-label::after {
  content: ''; flex: 1; max-width: 48px;
  height: 1px; background: rgba(17,17,17,.18);
}
.fd-title {
  grid-column: 1 / 8; grid-row: 2;
  font-family: var(--font-display);
  font-size: clamp(36px, 4vw, 60px);
  line-height: 1.05; letter-spacing: -.02em;
}
.fd-geo {
  grid-column: 9 / 13; grid-row: 1 / 4;
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  min-height: 200px;
}
.fd-geo-block { border-radius: 3px; }
.fd-geo-block:nth-child(1){background:#111;}
.fd-geo-block:nth-child(2){background:#4a9aaa;}
.fd-geo-block:nth-child(3){background:rgba(17,17,17,.1); border:1px solid rgba(17,17,17,.12);}
.fd-geo-block:nth-child(4){background:#111; opacity:.25;}

.fd-desc {
  grid-column: 1 / 8; grid-row: 3;
  font-size: 13px; color: rgba(17,17,17,.6); line-height: 1.8;
}
.fd-tags {
  grid-column: 1 / 8; grid-row: 4;
  display: flex; flex-wrap: wrap; gap: 8px;
}
.fd-tag {
  font-family: var(--font-mono); font-size: 9px;
  letter-spacing: .2em; text-transform: uppercase;
  border: 1px solid rgba(17,17,17,.18);
  padding: 5px 11px; color: rgba(17,17,17,.55);
}
.fd-price {
  grid-column: 1 / 5; grid-row: 5;
  padding-top: 18px; border-top: 1px solid rgba(17,17,17,.1);
}
.fd-price-lbl {
  font-family: var(--font-mono); font-size: 9px;
  letter-spacing: .3em; text-transform: uppercase;
  color: rgba(17,17,17,.4); margin-bottom: 4px;
}
.fd-price-val {
  font-family: var(--font-display); font-size: 36px;
}
.fd-includes {
  grid-column: 5 / 13; grid-row: 5;
  padding-top: 18px; border-top: 1px solid rgba(17,17,17,.1);
  display: grid; grid-template-columns: repeat(3,1fr); gap: 14px;
}
.fd-inc-label {
  font-family: var(--font-mono); font-size: 9px;
  letter-spacing: .2em; text-transform: uppercase;
  color: rgba(17,17,17,.4); margin-bottom: 4px;
}
.fd-inc-text { font-size: 12px; color: rgba(17,17,17,.6); }

/* ─── PROCESS ─── */
.process {
  padding: 120px 60px;
  border-top: 1px solid var(--border);
}
.process-grid {
  display: grid; grid-template-columns: repeat(3,1fr); gap: 60px;
  margin-top: 72px;
}
.proc-num {
  font-family: var(--font-display); font-style: italic;
  font-size: 64px; color: var(--accent); opacity: .3;
  line-height: 1; margin-bottom: 20px;
}
.proc-name { font-size: 19px; font-weight: 700; margin-bottom: 10px; }
.proc-text { font-size: 14px; color: var(--text-dim); line-height: 1.8; }

/* ─── PROMISE ─── */
.promise {
  padding: 120px 60px;
  background: rgba(212,168,83,.03);
  border-top: 1px solid rgba(212,168,83,.08);
  border-bottom: 1px solid rgba(212,168,83,.08);
}
.promise-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 80px;
  margin-top: 56px; align-items: start;
}
.promise-big {
  font-family: var(--font-display);
  font-size: clamp(42px, 4.5vw, 68px);
  letter-spacing: -.02em; line-height: 1.08;
  margin-bottom: 24px;
}
.promise-sub { font-size: 15px; color: var(--text-dim); line-height: 1.85; }
.promise-item {
  padding: 22px 0; border-bottom: 1px solid var(--border);
  display: flex; gap: 18px; align-items: flex-start;
}
.promise-item:first-child { border-top: 1px solid var(--border); }
.pcheck {
  font-family: var(--font-mono); font-size: 10px;
  color: var(--accent); flex-shrink: 0; margin-top: 2px;
}
.ptext { font-size: 14px; color: var(--text-dim); line-height: 1.7; }
.ptext strong { color: var(--text); font-weight: 500; }

/* ─── FOOTER CTA ─── */
.footer-cta {
  padding: 160px 60px 100px;
  text-align: center; position: relative; overflow: hidden;
}
.footer-bg {
  position: absolute;
  font-family: var(--font-display); font-style: italic;
  font-size: clamp(120px, 20vw, 300px);
  color: rgba(233,233,224,.025);
  top: 50%; left: 50%; transform: translate(-50%,-50%);
  white-space: nowrap; pointer-events: none; line-height: 1;
  user-select: none;
}
.footer-lbl {
  font-family: var(--font-mono); font-size: 9px;
  letter-spacing: .45em; text-transform: uppercase;
  color: var(--accent); margin-bottom: 28px;
  position: relative; z-index: 1;
}
.footer-big {
  font-family: var(--font-display);
  font-size: clamp(52px, 7.5vw, 100px);
  letter-spacing: -.025em; line-height: 1.05;
  margin-bottom: 24px;
  position: relative; z-index: 1;
}
.footer-sub {
  font-size: 15px; color: var(--text-dim);
  margin-bottom: 56px;
  position: relative; z-index: 1;
}
.footer-btn {
  display: inline-block;
  font-family: var(--font-mono); font-size: 11px;
  letter-spacing: .2em; text-transform: uppercase;
  color: var(--bg); background: var(--text);
  padding: 16px 40px; text-decoration: none;
  position: relative; z-index: 1;
  transition: background .2s;
}
.footer-btn:hover { background: var(--accent); }

.footer-bottom {
  padding: 36px 60px;
  border-top: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
}
.footer-name {
  font-family: var(--font-mono); font-size: 10px;
  letter-spacing: .28em; text-transform: uppercase; color: var(--text-dim);
}
.footer-note {
  font-family: var(--font-mono); font-size: 9px;
  color: rgba(233,233,224,.2); letter-spacing: .08em;
}

/* ─── PORTFOLIO ─── */
.portfolio { padding: 0 60px 120px; }

.portfolio-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 40px; max-width: 880px;
  margin-top: 0;
}
.pcard {
  display: block; text-decoration: none; color: inherit;
}
.pcard-preview {
  width: 420px; height: 263px;
  overflow: hidden; position: relative;
  border: 1px solid var(--border);
  transition: transform .35s cubic-bezier(.16,1,.3,1),
              border-color .35s;
  will-change: transform;
}
.pcard:hover .pcard-preview {
  transform: translateY(-5px);
  border-color: rgba(233,233,224,.18);
}
.pcard-info { padding: 20px 0 0; }
.pcard-type {
  font-family: var(--font-mono); font-size: 9px;
  letter-spacing: .35em; text-transform: uppercase;
  color: var(--accent); display: block; margin-bottom: 8px;
}
.pcard-title {
  font-family: var(--font-display); font-size: 22px;
  letter-spacing: -.01em; margin-bottom: 8px;
}
.pcard-desc {
  font-size: 13px; color: var(--text-dim); line-height: 1.75;
}
.pcard-link {
  display: inline-block; margin-top: 12px;
  font-family: var(--font-mono); font-size: 9px;
  letter-spacing: .25em; text-transform: uppercase;
  color: var(--text-dim);
  border-bottom: 1px solid rgba(233,233,224,.15);
  padding-bottom: 2px;
  transition: color .2s, border-color .2s;
}
.pcard:hover .pcard-link {
  color: var(--accent); border-color: var(--accent);
}

/* ─── MOBILE ─── */
@media (max-width: 768px) {
  nav { padding: 16px 24px; }
  .hero { padding: 88px 24px 60px; }
  .sh { padding: 80px 24px 0; }
  .svc-web, .svc-flat, .portfolio { padding: 0 24px 80px; }
  .portfolio-grid { grid-template-columns: 1fr; }
  .pcard-preview { width: 307px; height: 192px; }
  .svc-info { flex-direction: column; }
  .price-box { text-align: left; }
  .mock-hero { grid-template-columns: 1fr; }
  .mock-visual { display: none; }
  .mock-cards { grid-template-columns: 1fr; }
  .svc-poster { grid-template-columns: 1fr; }
  .poster-left { padding: 60px 24px; min-height: 60vh; }
  .poster-right { padding: 48px 24px; }
  .flat-demo { padding: 32px; grid-template-columns: 1fr; }
  .fd-label,.fd-title,.fd-geo,.fd-desc,.fd-tags,.fd-price,.fd-includes {
    grid-column: 1; grid-row: auto;
  }

.entry-desc p:last-child { margin-bottom: 0; }

.entry-desc em { font-style: normal; color: var(--accent); }

/* 条目元数据 · 一行标签 */
.entry-meta {
  margin-top: clamp(28px, 4vh, 44px);
  font-family: 'Space Mono', monospace;
  font-size: var(--fs-label);
  letter-spacing: .2em;
  color: var(--text-dim);
  opacity: .55;
  position: relative; z-index: 2;
  text-align: center;
}
.entry-meta .sep { opacity: .3; margin: 0 .6em; }

/* 朱红细线 */
.entry-rule {
  margin-top: clamp(20px, 3vh, 36px);
  width: 40px; height: 1px;
  background: var(--accent);
  opacity: .35;
  position: relative; z-index: 2;
}

/* ============================================
   间歇屏（Breaker）· 翻页 + 呼吸
   ============================================ */
.breaker {
  min-height: 80svh;
  display: flex; align-items: center; justify-content: center;
  position: relative;
  padding: 24px;
}

.breaker-char {
  font-family: 'Bebas Neue', 'Noto Sans SC', sans-serif;
  font-weight: 400;
  font-size: clamp(160px, 26vw, 380px);
  line-height: 1;
  letter-spacing: -.03em;
  color: var(--text);
  opacity: .045;
  position: relative; z-index: 1;
  user-select: none;
  animation: breathe 7s ease-in-out infinite;
}
@keyframes breathe {
  0%, 100% { opacity: .035; }
  50%      { opacity: .06; }
}

.breaker-line {
  position: absolute;
  left: 50%; transform: translateX(-50%);
  width: 1px; height: 60px;
  background: var(--text-dim);
  opacity: .1;
}
.breaker-line.top { top: 12%; }
.breaker-line.bottom { bottom: 12%; }

/* ============================================
   尾屏
   ============================================ */
.outro { min-height: 100svh; text-align: center; }

.outro-text {
  font-family: 'Noto Sans SC', sans-serif;
  font-weight: 400;
  font-size: clamp(28px, 4.5vw, 48px);
  line-height: 1.7;
  letter-spacing: .04em;
  color: var(--text);
  opacity: .7;
  position: relative; z-index: 2;
  max-width: var(--body-w);
}

.outro-dot {
  display: inline-block;
  width: 10px; height: 10px;
  background: var(--accent);
  border-radius: 50%;
  margin-top: 44px;
  opacity: .6;
  position: relative; z-index: 2;
  box-shadow: 0 0 10px rgba(212,44,34,.35);
}

.outro-sign {
  margin-top: 40px;
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: .35em;
  color: var(--text-dim);
  opacity: .35;
  position: relative; z-index: 2;
}

/* ============================================
   滚动 Reveal（交错 delay 由 JS 注入）
   ============================================ */
.reveal {
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 800ms cubic-bezier(.18,.62,.18,1),
              transform 800ms cubic-bezier(.18,.62,.18,1);
}
.reveal.visible {
  opacity: 1;
  transform: translateY(0);
}

/* ============================================
   响应式
   ============================================ */
@media (max-width: 640px) {
  :root {
    --fs-body: 16px;
    --body-w: 100%;
    --fs-display: clamp(56px, 16vw, 80px);
  }
  .folio { right: 10px; bottom: 14px; }
  .section { padding: 56px 16px; }
  .entry-desc { padding: 0 4px; }
  .entry-desc p { text-indent: 1.5em; }
  .intro-block { padding-left: 16px; }
}

/* ============================================
   prefers-reduced-motion
   ============================================ */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: .01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: .01ms !important;
  }
  #particles, .spotlight { display: none; }
  .reveal { opacity: 1; transform: none; }
  .scroll-hint { display: none; }
  html { scroll-behavior: auto; }
}
</style>

<!-- HERO -->

  </p>

<!-- CHAPTER 01 — 朔 -->
<section class="ch">
  <div class="ch-phase r">朔</div>
  <div class="ch-tag r d1">New Moon</div>
  <h2 class="ch-title r d1">一切始于看不见</h2>
  <div class="ch-body">
    <p class="r d2">
      朔月的夜最暗。月亮与太阳处于同一方向，反射的光全部落在地球的反面——我们看不见它，但它确确实实在那里，像一粒种子沉入土壤，尚未破土，尚未发光，但一切已经开始了。
    </p>
    <p class="r d3">
      每一个循环的起点都是<span class="accent">不见</span>。匠人磨刀时不发光，作家构思时不发光，孩子在学会说话之前的沉默里也不发光。看不见，不是不存在。看不见，是积蓄。
    </p>
    <p class="r">
      <em>If the moon could speak, it would say: I was never gone. You just hadn't learned to look yet.</em>
    </p>
  </div>
</section>

<!-- BREAKER 01 -->
<section class="brk">
  <div class="brk-rule r"></div>
  <blockquote class="brk-quote r">
    "你看不见月亮的时候，<br>它正为另一片海涨潮。"
  </blockquote>
  <p class="brk-attr r d1">—— 渔民的谚语</p>
</section>

<!-- CHAPTER 02 — 上弦 -->
<section class="ch">
  <div class="ch-phase ch-phase--diag r"><span>上</span><span class="ch-phase__c2">弦</span></div>
  <div class="ch-tag r d1">Waxing Crescent</div>
  <h2 class="ch-title r d1">缓慢地变亮，<br>缓慢地被看见</h2>
  <div class="ch-body">
    <p class="r d2">
      上弦月是一道细长的弧线，像被割开的口子，光从口子里渗出来。这个过程缓慢得不合时宜——七天，从蛾眉月到半月，每一天都只是多亮了一点点，肉眼几乎分辨不出。
    </p>
    <p class="r d3">
      但<span class="accent">累积</span>这件事实在太容易被低估了。一道弧线加一道弧线，第七天就有了半个圆。大多数人在第一天就放弃了，因为他们觉得这一天和第二天的区别太小。区别小，不是没有区别。
    </p>
    <p class="r">
      <em>Waxing is a quiet discipline. No one applauds a crescent. But the crescent is already halfway to full.</em>
    </p>
  </div>
</section>

<!-- BREAKER 02 -->
<section class="brk">
  <div class="brk-rule r"></div>
  <blockquote class="brk-quote r">
    "我们以为的突变，<br>都是<em>日积月累</em>的必然。"
  </blockquote>
  <p class="brk-attr r d1">—— 天文学笔记</p>
</section>

<!-- CHAPTER 03 — 望 -->
<section class="ch">
  <div class="ch-phase r">望</div>
  <div class="ch-tag r d1">Full Moon</div>
  <h2 class="ch-title r d1">满月之夜，<br>万物歇息</h2>
  <div class="ch-body">
    <p class="r d2">
      满月是月球轨道的中点——它与太阳隔地相望，整面都被照亮。对于习惯了新月和上弦月的人来说，满月是异象：太亮了，太圆了，太安静了。潮汐达到最大，狼群对着它嗥叫，失眠者在这夜格外清醒。
    </p>
    <p class="r d3">
      但满月不是一个顶点。它只是<span class="accent">中点</span>。今天亮到了极致，明天就开始消耗。很多人把满月当成了终点，于是从这一天起开始焦虑——因为他们以为盛大的时刻应该被留住。《易经》里写"日中则昃，月盈则亏"，说的不是悲观，说的是接受。
    </p>
    <p class="r">
      <em>The full moon doesn't ask to be remembered. It rises, it shines, it wanes. That is its dignity.</em>
    </p>
  </div>
</section>

<!-- BREAKER 03 -->
<section class="brk">

    <p>纸船 VII 型是他的第七个版本。一张防水纸折成，入水后缓慢溶解——不会沉，只会变薄、变透，最后与水无法区分。像冰在室温里消失，不在某个具体时刻，而在你转头的间隙里，不再在了。</p>
    <p>七枚原型折好了。他曾在西湖边站到傍晚，手里攥着一枚，最终没有松手。第二年春天回到同一位置，湖面平静。他把船收进档案柜，标签上写了「未完成」，然后画了第八版的折痕线。没有画正视图。</p>

<script>
// CSS toggle
function activateCSS(page) {
  document.querySelectorAll('style[data-page]').forEach(s => {
    if (s.dataset.page === 'shell') return;
    s.media = s.dataset.page === page ? '' : 'not all';
  });
}

// HTML mount
function mountHTML(page) {
  const mount = document.getElementById('mount');
  mount.innerHTML = '';
  mount.appendChild(document.getElementById('t-' + page).content.cloneNode(true));
}

// Nav highlight
function updateNav(page) {
  document.querySelectorAll('#shell-nav .sn-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.page === page));
}

const delay = ms => new Promise(r => setTimeout(r, ms));
let currentPage = null;

async function navigate(page) {
  if (currentPage === page) return;
  const cover = document.getElementById('shell-cover');
  cover.classList.add('on');
  await delay(350);
  pages[currentPage]?.destroy();
  activateCSS(page);
  mountHTML(page);
  window.scrollTo(0, 0);
  updateNav(page);
  currentPage = page;
  cover.classList.remove('on');
  await delay(30);
  pages[page].init();
}

// ── HOME ──
const homePage = {
  _ra: null, _onMove: null, _onScroll: null, _onTouch: null,
  init() {
    const prog = document.getElementById('progress');
    this._onScroll = () => {
      const pct = window.scrollY / (document.body.scrollHeight - window.innerHeight);
      prog.style.width = (pct * 100) + '%';
    };
    window.addEventListener('scroll', this._onScroll, { passive: true });

    const dot = document.getElementById('cur-dot');
    const ring = document.getElementById('cur-ring');
    let mx = 0, my = 0, rx = 0, ry = 0;
    this._onMove = e => {
      mx = e.clientX; my = e.clientY;
      dot.style.left = mx + 'px'; dot.style.top = my + 'px';
    };
    document.addEventListener('mousemove', this._onMove);
    let rafOn = true;
    const tick = () => {
      if (!rafOn) return;
      rx += (mx - rx) * .11; ry += (my - ry) * .11;
      ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
      this._ra = requestAnimationFrame(tick);
    };
    tick();
    this._onTouch = () => { dot.style.display = 'none'; ring.style.display = 'none'; };
    window.addEventListener('touchstart', this._onTouch, { once: true });
    document.querySelectorAll('#mount a, #mount button').forEach(el => {
      el.addEventListener('mouseenter', () => { ring.style.width = ring.style.height = '54px'; });
      el.addEventListener('mouseleave', () => { ring.style.width = ring.style.height = '36px'; });
    });
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('on'); obs.unobserve(e.target); } });
    }, { threshold: 0.12 });
    document.querySelectorAll('#mount .rv').forEach(el => obs.observe(el));
    document.querySelectorAll('#mount .pcard[data-target]').forEach(el => {
      el.addEventListener('click', e => { e.preventDefault(); navigate(el.dataset.target); });
    });
  },
  destroy() {
    cancelAnimationFrame(this._ra); this._ra = null;
    if (this._onScroll) window.removeEventListener('scroll', this._onScroll);
    if (this._onMove) document.removeEventListener('mousemove', this._onMove);
    if (this._onTouch) window.removeEventListener('touchstart', this._onTouch);
  }
};

// ── LUNAR ──
const lunarPage = {
  _ra1: null, _ra2: null, _listeners: [],
  init() {
    const REDUCE = window.matchMedia('(prefers-reduced-motion:reduce)').matches;

    const moonCanvas = document.getElementById('moon-canvas');
    if (moonCanvas && !REDUCE) {
      const mctx = moonCanvas.getContext('2d');
      let moonT = 0;
      const resizeMoon = () => { moonCanvas.width = moonCanvas.offsetWidth; moonCanvas.height = moonCanvas.offsetHeight; };
      resizeMoon();
      const _r1 = () => resizeMoon();
      window.addEventListener('resize', _r1);
      this._listeners.push(() => window.removeEventListener('resize', _r1));
      const drawMoon = () => {
        mctx.clearRect(0, 0, moonCanvas.width, moonCanvas.height);
        const cx = moonCanvas.width * 0.82, cy = moonCanvas.height * 0.22;
        const moonR = Math.min(moonCanvas.width, moonCanvas.height) * 0.22;
        const glow = mctx.createRadialGradient(cx,cy,moonR*.7,cx,cy,moonR*1.8);
        glow.addColorStop(0,'rgba(237,228,208,0.06)'); glow.addColorStop(.5,'rgba(237,228,208,0.02)'); glow.addColorStop(1,'rgba(237,228,208,0)');
        mctx.fillStyle=glow; mctx.beginPath(); mctx.arc(cx,cy,moonR*1.8,0,Math.PI*2); mctx.fill();
        const phase=(Math.sin(moonT*.0003)+1)/2;
        mctx.fillStyle='rgba(237,228,208,0.15)'; mctx.beginPath(); mctx.arc(cx,cy,moonR,0,Math.PI*2); mctx.fill();
        const lg=mctx.createRadialGradient(cx-moonR*.25,cy-moonR*.2,moonR*.1,cx,cy,moonR);
        lg.addColorStop(0,`rgba(237,228,208,${.32+phase*.12})`); lg.addColorStop(.7,`rgba(237,228,208,${.12+phase*.06})`); lg.addColorStop(1,'rgba(237,228,208,0)');
        mctx.fillStyle=lg; mctx.beginPath(); mctx.arc(cx,cy,moonR*.95,0,Math.PI*2); mctx.fill();
        mctx.fillStyle='rgba(14,11,8,1)'; mctx.beginPath();
        mctx.ellipse(cx+(phase-.5)*moonR*2,cy,moonR*1.02,moonR*1.02,0,0,Math.PI*2); mctx.fill();
        for(let i=0;i<12;i++){
          const sx=cx+Math.cos(i*1.7+moonT*.001)*moonR*1.6, sy=cy+Math.sin(i*2.3+moonT*.0008)*moonR*1.8;
          mctx.fillStyle=`rgba(237,228,208,${.08+.12*Math.sin(moonT*.02+i*3)})`;
          mctx.beginPath(); mctx.arc(sx,sy,.6+Math.random()*.8,0,Math.PI*2); mctx.fill();
        }
        moonT++; this._ra1=requestAnimationFrame(drawMoon);
      };
      this._ra1=requestAnimationFrame(drawMoon);
    }

    const cornerMoon = document.getElementById('corner-moon');
    if (cornerMoon && !REDUCE) {
      const cm=cornerMoon.getContext('2d'), cmR=56;
      const draw=()=>{
        const total=document.documentElement.scrollHeight-window.innerHeight;
        const phase=total>0?Math.max(0,Math.min(1,window.scrollY/total)):0;
        cm.clearRect(0,0,112,112);
        const g=cm.createRadialGradient(cmR,cmR,cmR*.4,cmR,cmR,cmR*1.8);
        g.addColorStop(0,'rgba(237,228,208,0.18)'); g.addColorStop(.5,'rgba(237,228,208,0.06)'); g.addColorStop(1,'rgba(237,228,208,0)');
        cm.fillStyle=g; cm.beginPath(); cm.arc(cmR,cmR,cmR*1.8,0,Math.PI*2); cm.fill();
        cm.fillStyle='rgba(237,228,208,.85)'; cm.beginPath(); cm.arc(cmR,cmR,cmR-5,0,Math.PI*2); cm.fill();
        cm.fillStyle='#0e0b08'; cm.beginPath(); cm.ellipse(cmR+(phase-.5)*cmR*4.4,cmR,cmR*1.08,cmR*1.08,0,0,Math.PI*2); cm.fill();
        cm.strokeStyle='rgba(237,228,208,.4)'; cm.lineWidth=1; cm.beginPath(); cm.arc(cmR,cmR,cmR-5,0,Math.PI*2); cm.stroke();
      };
      draw();
      const _sc=()=>draw(), _rs=()=>draw();
      window.addEventListener('scroll',_sc,{passive:true}); window.addEventListener('resize',_rs);
      this._listeners.push(()=>{window.removeEventListener('scroll',_sc);window.removeEventListener('resize',_rs);});
    }

    const bar=document.getElementById('bar');
    const _sb=()=>{ const t=document.documentElement.scrollHeight-window.innerHeight; bar.style.width=t>0?(window.scrollY/t*100)+'%':'0%'; };
    window.addEventListener('scroll',_sb,{passive:true});
    this._listeners.push(()=>window.removeEventListener('scroll',_sb));

    if(REDUCE){ document.querySelectorAll('#mount .r').forEach(el=>el.classList.add('on')); }
    else {
      const io=new IntersectionObserver(entries=>{ entries.forEach(e=>{ if(e.isIntersecting) e.target.classList.add('on'); }); },{threshold:.12});
      document.querySelectorAll('#mount .r').forEach(el=>io.observe(el));
    }
  },
  destroy() {
    if(this._ra1) cancelAnimationFrame(this._ra1);
    if(this._ra2) cancelAnimationFrame(this._ra2);
    this._listeners.forEach(fn=>fn()); this._listeners=[];
    this._ra1=this._ra2=null;
  }
};

// ── NEVER ──
const neverPage = {
  _ra: null, _trailDots: [], _listeners: [],
  init() {

    }
    const _mv=e=>{mx=e.clientX;my=e.clientY;}; window.addEventListener('mousemove',_mv,{passive:true}); this._listeners.push(()=>window.removeEventListener('mousemove',_mv));
    const _cl=e=>{ const r=document.createElement('span'); r.className='ripple'; r.style.left=e.clientX+'px'; r.style.top=e.clientY+'px'; document.body.appendChild(r); r.addEventListener('animationend',()=>r.remove()); }; window.addEventListener('click',_cl); this._listeners.push(()=>window.removeEventListener('click',_cl));
    let px=0,py=0,cpx=0,cpy=0;
    const _mvp=e=>{px=(e.clientX/innerWidth)*2-1;py=(e.clientY/innerHeight)*2-1;}; window.addEventListener('mousemove',_mvp,{passive:true}); this._listeners.push(()=>window.removeEventListener('mousemove',_mvp));
    const ambients=document.querySelectorAll('#mount .ambient');
    const loop=()=>{
      draw();
      spotlight.style.background=`radial-gradient(circle 280px at ${mx}px ${my}px,transparent 0%,transparent 28%,rgba(0,0,0,.30) 50%,rgba(0,0,0,.62) 75%,rgba(0,0,0,.78) 100%)`;
      this._trailDots[0].x=mx; this._trailDots[0].y=my;
      for(let i=TLEN-1;i>0;i--){ const s=i===1?.65:i===2?.45:i===3?.32:.24; this._trailDots[i].x+=(this._trailDots[i-1].x-this._trailDots[i].x)*s; this._trailDots[i].y+=(this._trailDots[i-1].y-this._trailDots[i].y)*s; }
      for(const t of this._trailDots){ t.el.style.left=t.x+'px'; t.el.style.top=t.y+'px'; }
      cpx+=(px-cpx)*.04; cpy+=(py-cpy)*.04;
      for(const el of ambients){ const d=parseFloat(el.dataset.depth)||.02; const base=el.style.transform||''; const extra=`translate(${cpx*40*d}px,${cpy*40*d}px)`; if(base.includes('translate(-50%')){ el.style.transform=base.replace(/translate\(-50%,\s*-50%\)/,`translate(-50%,-50%) ${extra}`); } else { el.style.transform=extra; } }
      this._ra=requestAnimationFrame(loop);
    };
    this._ra=requestAnimationFrame(loop);

    const revealer=new IntersectionObserver(entries=>{
      entries.forEach(e=>{ if(!e.isIntersecting)return; const sec=e.target.closest('.section,.breaker'); if(sec){ const sibs=sec.querySelectorAll('.reveal'); const idx=Array.from(sibs).indexOf(e.target); e.target.style.transitionDelay=(idx*110)+'ms'; } e.target.classList.add('visible'); revealer.unobserve(e.target); });
    },{threshold:.14});
    document.querySelectorAll('#mount .reveal').forEach(el=>revealer.observe(el));

    const sh=document.querySelector('#mount .scroll-hint');
    if(sh){ const _ssh=()=>{sh.style.opacity=Math.max(0,.4-scrollY/350);}; window.addEventListener('scroll',_ssh,{passive:true}); this._listeners.push(()=>window.removeEventListener('scroll',_ssh)); }
  },
  destroy() {
    cancelAnimationFrame(this._ra); this._ra=null;
    this._trailDots.forEach(t=>t.el.remove()); this._trailDots=[];
    this._listeners.forEach(fn=>fn()); this._listeners=[];
  }
};

const pages = { home: homePage, lunar: lunarPage, never: neverPage };

document.querySelectorAll('#shell-nav .sn-btn').forEach(btn => {
  btn.addEventListener('click', () => navigate(btn.dataset.page));
});

navigate('home');
</script>
