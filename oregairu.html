<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>侍奉社 · 三人的感情线 — 我的青春恋爱物语果然有问题</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700;800&family=Noto+Serif+SC:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@200;300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#17120E;--bg-2:#1E1813;--bg-3:#262019;
  --panel:rgba(38,32,25,.55);--panel-2:rgba(46,38,29,.7);
  --line:rgba(224,138,90,.10);--line-2:rgba(224,138,90,.22);
  --text:#F1E8DD;--text-soft:#BAAD9C;--text-faint:#796F60;
  --copper:#CC6B3D;--copper-bright:#E88C5A;--copper-deep:#9E4F2A;--copper-glow:rgba(224,138,90,.5);
  --yukino:#8FA8C8;--y-light:#cfdef5;
  --yuigahama:#E88C5A;--g-light:#f6c9a8;
  --hachiman:#7E938C;--h-light:#c8ddd6;
  --mincho:'Shippori Mincho','Noto Serif SC',serif;--serif:'Noto Serif SC',serif;--sans:'Noto Sans SC',-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;position:relative;overflow-x:hidden;cursor:default}
#sakura-canvas{position:fixed;inset:0;z-index:2;pointer-events:none}
.cursor-glow{position:fixed;z-index:200;pointer-events:none;width:380px;height:380px;border-radius:50%;background:radial-gradient(circle,rgba(232,140,90,.11) 0%,rgba(204,107,61,.04) 35%,transparent 70%);transform:translate(-50%,-50%);transition:opacity .4s;opacity:0}
.cursor-glow.visible{opacity:1}
.ambient{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.ambient-pool{position:absolute;border-radius:50%;filter:blur(140px)}
.ambient-pool.a{width:50vw;height:50vw;background:radial-gradient(circle,rgba(204,107,61,.13) 0%,transparent 70%);top:-14vw;left:50%;transform:translateX(-50%);animation:breathe 20s ease-in-out infinite}
.ambient-pool.b{width:38vw;height:38vw;background:radial-gradient(circle,rgba(143,168,200,.07) 0%,transparent 70%);bottom:-12vw;left:-8vw;animation:breatheB 27s ease-in-out infinite}
.ambient-pool.c{width:32vw;height:32vw;background:radial-gradient(circle,rgba(232,140,90,.06) 0%,transparent 70%);top:40vh;right:-10vw;animation:breatheC 23s ease-in-out infinite}
.ambient-pool.d{width:28vw;height:28vw;background:radial-gradient(circle,rgba(143,168,200,.04) 0%,transparent 70%);top:60vh;left:40%;animation:breatheD 25s ease-in-out infinite}
@keyframes breathe{0%,100%{opacity:.6;transform:translateX(-50%) scale(1)}50%{opacity:1;transform:translateX(-50%) scale(1.08)}}
@keyframes breatheB{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:.85;transform:scale(1.12)}}
@keyframes breatheC{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:.8;transform:scale(1.14)}}
@keyframes breatheD{0%,100%{opacity:.35;transform:scale(1)}50%{opacity:.7;transform:scale(1.1)}}
.ambient::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 48%,rgba(0,0,0,.55) 100%)}
::selection{background:rgba(204,107,61,.3);color:var(--text)}
.topbar,.section-wrap,.toast,.graph-stage,.scene-divider{position:relative;z-index:10}
.topbar{z-index:50}

.topbar{position:sticky;top:0;background:rgba(23,18,14,.78);backdrop-filter:blur(22px) saturate(120%);-webkit-backdrop-filter:blur(22px) saturate(120%);border-bottom:1px solid var(--line);padding:0 36px;display:flex;align-items:center;height:66px;gap:20px}
.brand{font-family:var(--mincho);font-size:17px;font-weight:600;letter-spacing:.04em;white-space:nowrap;color:var(--text)}
.brand .jp{color:var(--copper);font-size:13px;font-weight:500}
.brand-sub{font-family:var(--sans);font-weight:300;font-size:11px;color:var(--text-faint);letter-spacing:.06em;margin-left:auto;white-space:nowrap}

.hero{max-width:900px;margin:0 auto;padding:48px 32px 8px;text-align:center;position:relative;z-index:10}
.hero-eyebrow{font-family:var(--mincho);font-size:17px;font-weight:500;letter-spacing:.16em;color:var(--copper);margin-bottom:22px;text-shadow:0 0 18px rgba(204,107,61,.3)}
.hero h1{font-family:var(--mincho);font-size:clamp(30px,5.5vw,46px);font-weight:700;line-height:1.45;letter-spacing:.02em;margin-bottom:18px;display:inline-block;text-shadow:0 1px 0 #7a3e28,0 2px 0 #6a3420,0 3px 0 #5a2a18,0 4px 0 #4a2212,0 5px 0 #3a1a0c,0 6px 0 #2a1208,0 8px 2px rgba(0,0,0,.5),0 12px 5px rgba(0,0,0,.35),0 18px 10px rgba(0,0,0,.2),0 0 35px var(--copper-glow),0 0 70px rgba(204,107,61,.22),0 0 120px rgba(204,107,61,.08);transform:perspective(800px) rotateX(3deg);animation:titleBreathe 8s ease-in-out 1.5s infinite}
@keyframes titleBreathe{0%,100%{transform:perspective(800px) rotateX(3deg) translateY(0)}30%{transform:perspective(800px) rotateX(4.5deg) translateY(-3px)}70%{transform:perspective(800px) rotateX(2deg) translateY(2px)}}
.hero h1 em{font-style:normal;color:var(--copper-bright);text-shadow:0 1px 0 #8a4530,0 2px 0 #6a3020,0 3px 0 #4a2010,0 4px 2px rgba(0,0,0,.4),0 0 22px var(--copper-glow),0 0 50px rgba(232,140,90,.5);animation:textPulse 3.5s ease-in-out infinite}
@keyframes textPulse{0%,100%{text-shadow:0 1px 0 #8a4530,0 2px 0 #6a3020,0 3px 0 #4a2010,0 4px 2px rgba(0,0,0,.4),0 0 22px var(--copper-glow),0 0 50px rgba(232,140,90,.5)}50%{text-shadow:0 1px 0 #8a4530,0 2px 0 #6a3020,0 3px 0 #4a2010,0 4px 2px rgba(0,0,0,.4),0 0 35px var(--copper-glow),0 0 75px rgba(232,140,90,.7),0 0 120px rgba(232,140,90,.3)}}
.hero p.lede{font-family:var(--serif);font-weight:300;font-size:15.5px;color:var(--text-soft);line-height:2;max-width:560px;margin:0 auto}

.title-particles{position:absolute;inset:0;pointer-events:none}
.title-particle{position:absolute;border-radius:50%;background:var(--copper-bright);box-shadow:0 0 6px var(--copper-glow),0 0 14px rgba(232,140,90,.4);animation:tpFloat 4s ease-in-out infinite}
.title-particle:nth-child(1){width:3px;height:3px;top:12%;left:4%;animation-delay:0s}
.title-particle:nth-child(2){width:2px;height:2px;top:8%;right:6%;animation-delay:.6s}
.title-particle:nth-child(3){width:4px;height:4px;bottom:18%;left:10%;animation-delay:1.2s}
.title-particle:nth-child(4){width:2.5px;height:2.5px;bottom:22%;right:8%;animation-delay:1.8s}
.title-particle:nth-child(5){width:3.5px;height:3.5px;top:38%;left:1%;animation-delay:2.4s}
.title-particle:nth-child(6){width:2px;height:2px;top:32%;right:3%;animation-delay:3s}
@keyframes tpFloat{0%,100%{transform:translate(0,0) scale(1);opacity:.25}25%{transform:translate(20px,-24px) scale(2.3);opacity:.9}50%{transform:translate(-10px,-16px) scale(1.5);opacity:.45}75%{transform:translate(-22px,8px) scale(2.8);opacity:.75}}

.scene-divider{max-width:920px;margin:20px auto 16px;padding:0 32px;display:grid;grid-template-columns:1fr 1fr;gap:14px}
.scene-strip{height:150px;border-radius:6px;overflow:hidden;position:relative;border:1px solid var(--line);transition:all .5s}
.scene-strip:hover{border-color:var(--line-2)}
.scene-strip .strip-img{position:absolute;inset:0;background-size:cover;background-position:center;opacity:.38;transition:opacity .5s,transform .8s}
.scene-strip:hover .strip-img{opacity:.58;transform:scale(1.04)}
.scene-strip .strip-overlay{position:absolute;inset:0;background:linear-gradient(180deg,transparent 0%,rgba(23,18,14,.88) 100%);display:flex;align-items:flex-end;padding:16px 22px}
.strip-label{font-family:var(--mincho);font-size:18px;font-weight:600;color:var(--text);letter-spacing:.04em;text-shadow:0 0 12px rgba(0,0,0,.8)}
.strip-jp{font-family:var(--mincho);font-size:12px;color:var(--copper);margin-left:10px;font-weight:400}

.graph-stage{max-width:1040px;margin:8px auto 0;padding:0 32px 40px;display:grid;grid-template-columns:1fr 360px;gap:36px;align-items:start;position:relative;z-index:10}
.graph-area{position:relative;width:100%}
.graph-svg{width:100%;height:auto;display:block;overflow:visible;position:relative;z-index:1}
.edge-line{fill:none;stroke-width:2.2;transition:filter .35s}
.edge:hover .edge-line,.edge.active .edge-line{filter:drop-shadow(0 0 8px var(--copper-glow))}
.edge-hit{fill:none;stroke:transparent;stroke-width:26;cursor:pointer}
.edge-label{font-family:var(--mincho);font-size:13px;fill:var(--text-soft);transition:fill .3s;letter-spacing:.04em}
.edge:hover .edge-label,.edge.active .edge-label{fill:var(--copper-bright)}
.edge-label-bg{fill:var(--bg);opacity:.85}
.core-ring{fill:none;stroke:var(--line-2);stroke-width:1.2;stroke-dasharray:4 5;animation:coreRotate 28s linear infinite;transform-origin:320px 300px}
@keyframes coreRotate{to{transform:rotate(360deg)}}
.core-label{font-family:var(--mincho);font-weight:600;text-anchor:middle}
.core-jp{fill:var(--copper);font-size:12px;letter-spacing:.1em}
.core-cn{fill:var(--text-soft);font-size:15px}
.edge-particle-core{fill:var(--copper-bright)}.edge-particle-glow{fill:var(--copper-glow)}

.node-card{position:absolute;z-index:5;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;transition:filter .4s}
.node-card:hover{z-index:20!important;filter:drop-shadow(0 0 28px var(--copper-glow))}
.node-card-avatar{width:100px;height:100px;border-radius:50%;overflow:hidden;border:3px solid var(--ring-color);box-shadow:0 0 24px var(--glow-color),0 8px 24px rgba(0,0,0,.5);transition:all .5s cubic-bezier(.34,1.56,.64,1)}
.node-card:hover .node-card-avatar,.node-card.active .node-card-avatar{border-width:4px;box-shadow:0 0 36px var(--glow-color),0 12px 32px rgba(0,0,0,.6)}
.node-card-avatar img{width:100%;height:100%;object-fit:cover;transition:transform .6s}
.node-card:hover .node-card-avatar img{transform:scale(1.08)}
.node-card-label{font-family:var(--mincho);font-size:17px;font-weight:700;color:var(--name-color);text-shadow:0 0 14px var(--glow-color),0 2px 8px rgba(0,0,0,.7);white-space:nowrap;transition:all .3s}
.node-card-spotlight{position:absolute;top:-6px;right:-6px;font-family:var(--mincho);font-size:10px;color:var(--copper-bright);background:rgba(23,18,14,.85);border:1px solid var(--line-2);border-radius:3px;padding:2px 7px;letter-spacing:.06em;opacity:0;transform:translateY(-6px);transition:all .4s}
.node-card.top .node-card-spotlight{opacity:1;transform:translateY(0)}

/* DETAIL — image carousel */
.detail{background:var(--panel);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid var(--line);border-radius:4px;overflow:hidden;min-height:300px;position:relative;transition:transform .15s ease-out,box-shadow .4s;transform-style:preserve-3d;perspective:800px}
.detail:hover{box-shadow:0 8px 40px rgba(0,0,0,.5),0 0 0 1px var(--line-2)}
.detail::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--accent);box-shadow:0 0 12px var(--copper-glow);animation:accentPulse 3s ease-in-out infinite;z-index:2}
@keyframes accentPulse{0%,100%{box-shadow:0 0 12px var(--copper-glow)}50%{box-shadow:0 0 24px var(--copper-glow),0 0 48px var(--copper-glow)}}
.detail-carousel{position:relative;height:230px;overflow:hidden;cursor:pointer}
.detail-carousel img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;opacity:0;transition:opacity .8s ease-in-out}
.detail-carousel img.active{opacity:.6}
.detail-carousel:hover img.active{opacity:.8}
.detail-carousel-counter{position:absolute;top:12px;right:14px;z-index:3;background:rgba(23,18,14,.75);border-radius:3px;padding:3px 8px;font-family:var(--sans);font-size:11px;color:var(--text-soft);letter-spacing:.04em}
.detail-carousel-arrows{position:absolute;inset:0;z-index:3;display:flex;align-items:center;justify-content:space-between;padding:0 8px;pointer-events:none;opacity:0;transition:opacity .3s}
.detail-carousel:hover .detail-carousel-arrows{opacity:1}
.detail-carousel-arrow{pointer-events:auto;width:30px;height:30px;border-radius:50%;background:rgba(23,18,14,.7);border:1px solid var(--line-2);color:var(--text-soft);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s}
.detail-carousel-arrow:hover{background:rgba(204,107,61,.25);color:var(--copper-bright);border-color:var(--copper)}
.detail-carousel-dots{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);z-index:3;display:flex;gap:5px}
.detail-carousel-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.25);transition:all .3s;cursor:pointer}
.detail-carousel-dot.active{background:var(--copper-bright);box-shadow:0 0 6px var(--copper-glow)}
.detail-body-wrap{padding:18px 24px 20px;position:relative;z-index:2}
.detail-tag{font-family:var(--sans);font-weight:300;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--text-faint);margin-bottom:5px}
.detail-title{font-family:var(--mincho);font-size:20px;font-weight:700;color:var(--text);margin-bottom:2px;transition:transform .3s}
.detail:hover .detail-title{transform:translateZ(8px)}
.detail-jp{font-family:var(--mincho);font-size:11px;color:var(--accent);margin-bottom:8px}
.detail-body{font-family:var(--serif);font-weight:300;font-size:12.5px;line-height:1.8;color:var(--text-soft)}
.detail-quote{margin-top:10px;padding:8px 0 2px;border-top:1px solid var(--line);font-family:var(--mincho);font-size:13px;color:var(--text);line-height:1.5}
.detail-quote::before{content:'「';color:var(--accent)}.detail-quote::after{content:'」';color:var(--accent)}
.detail-hint{font-family:var(--sans);font-weight:300;font-size:10px;color:var(--text-faint);margin-top:8px;letter-spacing:.03em}

.section-wrap{max-width:760px;margin:0 auto;padding:48px 32px 100px}
.section-head{text-align:center;margin-bottom:48px}
.section-eyebrow{font-family:var(--mincho);font-size:15px;letter-spacing:.12em;color:var(--copper);margin-bottom:10px}
.section-title{font-family:var(--mincho);font-size:30px;font-weight:700;color:var(--text)}
.phase{position:relative;padding-left:42px;padding-bottom:8px}
.phase::before{content:'';position:absolute;left:11px;top:34px;bottom:-8px;width:1px;background:linear-gradient(180deg,var(--line-2),var(--line))}
.phase:last-child::before{display:none}
.phase-dot{position:absolute;left:5px;top:18px;width:13px;height:13px;border-radius:50%;background:var(--bg);border:1.5px solid var(--line-2);transition:all .5s cubic-bezier(.34,1.56,.64,1);z-index:2}
.phase.open .phase-dot{background:var(--copper);border-color:var(--copper-bright);box-shadow:0 0 0 3px rgba(204,107,61,.15),0 0 16px var(--copper-glow);animation:dotPulse 2.5s ease-in-out infinite}
@keyframes dotPulse{0%,100%{box-shadow:0 0 0 3px rgba(204,107,61,.15),0 0 16px var(--copper-glow)}50%{box-shadow:0 0 0 8px rgba(204,107,61,.05),0 0 28px var(--copper-glow)}}
.phase-toggle{width:100%;display:flex;align-items:baseline;gap:14px;padding:14px 0;background:none;border:none;cursor:pointer;text-align:left;font-family:var(--sans)}
.phase-idx{font-family:var(--mincho);font-size:15px;font-weight:600;color:var(--copper);flex-shrink:0}
.phase-name{flex:1;font-family:var(--mincho);font-size:19px;font-weight:600;color:var(--text-soft);transition:color .3s}
.phase-toggle:hover .phase-name,.phase.open .phase-name{color:var(--text)}
.phase-jp{font-family:var(--mincho);font-size:12px;color:var(--text-faint)}
.phase-body{display:grid;grid-template-rows:0fr;opacity:0;transition:grid-template-rows .6s cubic-bezier(.16,1,.3,1),opacity .6s}
.phase-body-inner{overflow:hidden;min-height:0}
.phase.open .phase-body{grid-template-rows:1fr;opacity:1}
.phase-content{display:flex;gap:18px;padding:6px 0 22px}
.phase-text{flex:1;font-family:var(--serif);font-weight:300;font-size:14px;line-height:2;color:var(--text-soft)}
.phase-text b{font-weight:400;color:var(--text)}
.phase-img{width:140px;min-height:100px;border-radius:4px;overflow:hidden;flex-shrink:0;border:1px solid var(--line);transition:all .4s}
.phase-img img{width:100%;height:100%;object-fit:cover;opacity:.48;transition:opacity .4s}
.phase.open .phase-img img{opacity:.7}.phase-img:hover img{opacity:.9}
.tag-y{color:var(--y-light)}.tag-g{color:var(--g-light)}.tag-h{color:var(--h-light)}

.footer{text-align:center;padding:8px 32px 0}
.footer-ending{max-width:700px;margin:0 auto;padding:0 32px 60px;text-align:center}
.footer-ending img{max-width:100%;border-radius:8px;border:1px solid var(--line);opacity:.7;transition:opacity .5s,transform .5s}
.footer-ending img:hover{opacity:.9;transform:scale(1.02)}
.footer-line{font-family:var(--mincho);font-style:normal;font-size:18px;color:var(--text-soft);line-height:1.8;margin-bottom:18px}
.footer-jp{font-family:var(--mincho);font-size:13px;color:var(--text-faint);margin-top:16px;letter-spacing:.1em}

.music-toggle{position:fixed;bottom:28px;right:28px;z-index:500;width:44px;height:44px;border-radius:50%;background:var(--panel-2);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid var(--line-2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .4s cubic-bezier(.34,1.56,.64,1);box-shadow:0 4px 18px rgba(0,0,0,.45)}
.music-toggle:hover{transform:scale(1.12);border-color:var(--copper-bright);box-shadow:0 6px 28px rgba(0,0,0,.55),0 0 22px var(--copper-glow)}
.music-toggle svg{width:18px;height:18px;fill:var(--text-soft);transition:fill .3s}
.music-toggle:hover svg{fill:var(--copper-bright)}
.music-toggle.playing{background:rgba(204,107,61,.15);border-color:var(--copper)}
.music-toggle.playing svg{fill:var(--copper-bright)}
.music-toggle.playing::after{content:'';position:absolute;inset:-5px;border-radius:50%;border:1.5px solid var(--copper-glow);animation:musicPulse 2s ease-out infinite}
@keyframes musicPulse{0%{transform:scale(1);opacity:.5}100%{transform:scale(1.7);opacity:0}}

.ripple{position:fixed;z-index:300;pointer-events:none;width:16px;height:16px;border-radius:50%;background:radial-gradient(circle,rgba(232,140,90,.5) 0%,transparent 70%);transform:translate(-50%,-50%) scale(0);animation:rippleAnim .9s cubic-bezier(.16,1,.3,1) forwards}
@keyframes rippleAnim{to{transform:translate(-50%,-50%) scale(22);opacity:0}}
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--panel-2);backdrop-filter:blur(16px);border:1px solid var(--line-2);border-radius:4px;padding:10px 24px;font-family:var(--sans);font-size:13px;color:var(--text-soft);opacity:0;transition:transform .5s cubic-bezier(.34,1.56,.64,1),opacity .4s;z-index:400;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.reveal{opacity:0;transform:translateY(28px);transition:opacity 1s cubic-bezier(.16,1,.3,1),transform 1s cubic-bezier(.16,1,.3,1)}
.reveal.in{opacity:1;transform:translateY(0)}
@keyframes rise{from{opacity:0;transform:translateY(20px);filter:blur(6px)}to{opacity:1;transform:translateY(0);filter:blur(0)}}
.hero-eyebrow{animation:rise 1.1s cubic-bezier(.16,1,.3,1) both}
.hero h1{animation:rise 1.2s cubic-bezier(.16,1,.3,1) .12s both,titleBreathe 8s ease-in-out 1.5s infinite}
.hero p.lede{animation:rise 1.2s cubic-bezier(.16,1,.3,1) .24s both}

/* ═══ INTRO OVERLAY ═══ */
.intro-overlay{position:fixed;inset:0;z-index:999;pointer-events:none;background:rgba(23,18,14,.85);transition:opacity 2s ease-out}
.intro-overlay.done{opacity:0}
.intro-title{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:1000;pointer-events:none;font-family:var(--mincho);font-size:clamp(26px,4.5vw,38px);font-weight:700;color:var(--copper-bright);text-shadow:0 0 40px var(--copper-glow),0 0 80px rgba(232,140,90,.6);text-align:center;white-space:nowrap;opacity:0;transition:opacity 2.5s ease-out}
.intro-title.visible{opacity:1}
.intro-title.done{opacity:0;transform:translate(-50%,-50%) scale(1.5);transition:opacity 1s ease-out,transform 1s ease-out}
.intro-sub{position:fixed;top:calc(50% + 40px);left:50%;transform:translate(-50%,-50%);z-index:1000;pointer-events:none;font-family:var(--mincho);font-size:14px;font-weight:400;color:var(--text-soft);letter-spacing:.15em;opacity:0;transition:opacity 2s ease-out 1s}
.intro-sub.visible{opacity:.6}

/* card fly-in — applies to avatar, not card (to avoid position conflict) */

const pG=document.getElementById('edgeParticles'),epD=[];
[{x1:320,y1:96,x2:150,y2:392},{x1:320,y1:96,x2:490,y2:392},{x1:150,y1:392,x2:490,y2:392}].forEach(e=>{for(let i=0;i<3;i++){const t=i/3;const g=document.createElementNS('http://www.w3.org/2000/svg','circle');g.setAttribute('r','7');g.setAttribute('fill','rgba(232,140,90,.18)');pG.appendChild(g);const c=document.createElementNS('http://www.w3.org/2000/svg','circle');c.setAttribute('r','2.5');c.setAttribute('fill','#E88C5A');pG.appendChild(c);epD.push({edge:e,t,speed:.0012+Math.random()*.0018,glow:g,core:c})}});
function aEP(){if(reduce)return;for(const p of epD){p.t+=p.speed;if(p.t>1)p.t-=1;const x=lerp(p.edge.x1,p.edge.x2,p.t),y=lerp(p.edge.y1,p.edge.y2,p.t);p.glow.setAttribute('cx',x);p.glow.setAttribute('cy',y);p.core.setAttribute('cx',x);p.core.setAttribute('cy',y)}requestAnimationFrame(aEP)}if(!reduce)aEP();

// ROTATION
const graphArea=document.getElementById('graphArea'),graphSvg=document.getElementById('graphSvg');
const cards={yukino:document.getElementById('cardYukino'),hachiman:document.getElementById('cardHachiman'),yuigahama:document.getElementById('cardYuigahama')};
const VB={w:640,h:480},SLOTS={top:{x:320,y:88},bl:{x:135,y:400},br:{x:505,y:400}};
let slot={top:'yukino',bl:'hachiman',br:'yuigahama'};
const edgeEls={
  yh:{ln:document.getElementById('elnYH'),ht:document.getElementById('ehtYH'),lb:document.getElementById('elbYH'),ll:document.getElementById('ellYH'),from:'yukino',to:'hachiman'},
  yg:{ln:document.getElementById('elnYG'),ht:document.getElementById('ehtYG'),lb:document.getElementById('elbYG'),ll:document.getElementById('ellYG'),from:'yukino',to:'yuigahama'},
  hg:{ln:document.getElementById('elnHG'),ht:document.getElementById('ehtHG'),lb:document.getElementById('elbHG'),ll:document.getElementById('ellHG'),from:'hachiman',to:'yuigahama'},
};
function vbToPx(vx,vy){const sr=graphSvg.getBoundingClientRect(),ar=graphArea.getBoundingClientRect();return{x:(sr.left-ar.left)+vx*sr.width/VB.w,y:(sr.top-ar.top)+vy*sr.height/VB.h}}
function placeCard(card,vx,vy){const p=vbToPx(vx,vy);card.style.left=p.x+'px';card.style.top=p.y+'px';card.style.transform='translate(-50%,-50%)'}
function layoutCards(){for(const[s,c]of Object.entries(slot)){placeCard(cards[c],SLOTS[s].x,SLOTS[s].y);cards[c].classList.toggle('top',s==='top')}updateEdges()}
function getCardVb(key){const c=cards[key],ar=graphArea.getBoundingClientRect(),sr=graphSvg.getBoundingClientRect(),cr=c.getBoundingClientRect();return{x:(cr.left+cr.width/2-ar.left-(sr.left-ar.left))*VB.w/sr.width,y:(cr.top+cr.height/2-ar.top-(sr.top-ar.top))*VB.h/sr.height}}
function updateEdges(){const pos={};for(const k of Object.keys(cards))pos[k]=getCardVb(k);for(const e of Object.values(edgeEls)){const p1=pos[e.from],p2=pos[e.to];e.ln.setAttribute('x1',p1.x);e.ln.setAttribute('y1',p1.y);e.ln.setAttribute('x2',p2.x);e.ln.setAttribute('y2',p2.y);e.ht.setAttribute('x1',p1.x);e.ht.setAttribute('y1',p1.y);e.ht.setAttribute('x2',p2.x);e.ht.setAttribute('y2',p2.y)}}
let animA=false,animS=0,animF={},animT={},animSpot=null;const AD=700;
function bezPt(p0,p1,p2,t){const u=1-t;return{x:u*u*p0.x+2*u*t*p1.x+t*t*p2.x,y:u*u*p0.y+2*u*t*p1.y+t*t*p2.y}}
function animRot(now){if(!animS)animS=now;const raw=clamp((now-animS)/AD,0,1),t=1-Math.pow(1-raw,3);
  for(const[k,card]of Object.entries(cards)){const f=animF[k],to=animT[k],mid={x:(f.x+to.x)/2,y:(f.y+to.y)/2},pdx=to.x-f.x,pdy=to.y-f.y,dist=Math.hypot(pdx,pdy),nx=-pdy/dist,ny=pdx/dist,cp={x:mid.x+nx*(k===animSpot?1:-1)*dist*.35,y:mid.y+ny*(k===animSpot?1:-1)*dist*.35},pt=bezPt(f,cp,to,t);placeCard(card,pt.x,pt.y)}
  updateEdges();if(raw<1)requestAnimationFrame(animRot);else{for(const[k]of Object.entries(cards))placeCard(cards[k],animT[k].x,animT[k].y);animA=false;animS=0;layoutCards()}}
function getSlot(key){for(const[s,c]of Object.entries(slot))if(c===key)return s;return null}
function spotlight(key){if(animA||getSlot(key)==='top')return;animA=true;animSpot=key;
  for(const[k]of Object.entries(cards)){const vb=getCardVb(k);animF[k]={x:vb.x,y:vb.y}}
  const cs=getSlot(key);let ns={};if(cs==='bl')ns={top:slot.bl,bl:slot.br,br:slot.top};else if(cs==='br')ns={top:slot.br,bl:slot.top,br:slot.bl};
  animT={};for(const[s,c]of Object.entries(ns))animT[c]=SLOTS[s];slot=ns;requestAnimationFrame(animRot)}
for(const[k,card]of Object.entries(cards)){card.addEventListener('click',e=>{e.stopPropagation();spotlight(k);showDetail(k)})}
document.querySelectorAll('.edge-hit').forEach(el=>el.addEventListener('click',()=>showDetail(el.closest('.edge').dataset.key)));

// RIPPLE
document.addEventListener('click',e=>{if(reduce)return;const t=e.target.closest('.node-card,.edge-hit,.phase-toggle,.detail,.footer-ending');if(!t)return;const r=document.createElement('div');r.className='ripple';r.style.left=e.clientX+'px';r.style.top=e.clientY+'px';document.body.appendChild(r);r.addEventListener('animationend',()=>r.remove())});

// DETAIL + AUTO CAROUSEL
const detailEl=document.getElementById('detail'),detailBody=document.getElementById('detailBody');
const carouselImgs=document.getElementById('carouselImgs'),carouselCounter=document.getElementById('carouselCounter'),carouselDots=document.getElementById('carouselDots'),carouselEl=document.getElementById('detailCarousel');
let currentGallery=[],currentIdx=0,carouselTimer=null,carouselPaused=false;

function buildCarousel(){
  carouselImgs.innerHTML=currentGallery.map(src=>`<img src="${src}" alt="" loading="lazy">`).join('');
  carouselDots.innerHTML=currentGallery.map((_,i)=>`<div class="detail-carousel-dot${i===currentIdx?' active':''}" data-idx="${i}"></div>`).join('');
  carouselDots.querySelectorAll('.detail-carousel-dot').forEach(d=>{d.addEventListener('click',e=>{e.stopPropagation();goTo(parseInt(d.dataset.idx))})});
  updateCarousel();
}
function updateCarousel(){
  if(currentGallery.length===0)return;
  carouselImgs.querySelectorAll('img').forEach((img,i)=>img.classList.toggle('active',i===currentIdx));
  carouselCounter.textContent=`${currentIdx+1}/${currentGallery.length}`;
  carouselDots.querySelectorAll('.detail-carousel-dot').forEach((d,i)=>d.classList.toggle('active',i===currentIdx));
}
function goTo(idx){currentIdx=idx;updateCarousel();resetTimer()}
function carouselNext(){if(currentGallery.length<2)return;currentIdx=(currentIdx+1)%currentGallery.length;updateCarousel();resetTimer()}
function carouselPrev(){if(currentGallery.length<2)return;currentIdx=(currentIdx-1+currentGallery.length)%currentGallery.length;updateCarousel();resetTimer()}
function resetTimer(){clearInterval(carouselTimer);if(!carouselPaused&&currentGallery.length>1){carouselTimer=setInterval(carouselNext,3500)}}
// Pause on hover
carouselEl.addEventListener('mouseenter',()=>{carouselPaused=true;clearInterval(carouselTimer)});
carouselEl.addEventListener('mouseleave',()=>{carouselPaused=false;resetTimer()});
document.getElementById('carouselNext').addEventListener('click',e=>{e.stopPropagation();carouselNext()});
document.getElementById('carouselPrev').addEventListener('click',e=>{e.stopPropagation();carouselPrev()});
// Click on image to advance
carouselEl.addEventListener('click',e=>{if(e.target.tagName==='IMG')carouselNext()});

function showDetail(key){
  const d=relations[key]||chars[key]||relations.intro;
  detailEl.style.setProperty('--accent',d.accent);
  clearInterval(carouselTimer);carouselPaused=false;
  currentGallery=d.gallery||[d.img||'./社团.png'];currentIdx=0;buildCarousel();resetTimer();
  detailBody.innerHTML=`<div class="detail-tag">${d.tag}</div><div class="detail-title">${d.title}</div><div class="detail-jp">${d.jp}</div><div class="detail-body">${d.body}</div>${d.quote?`<div class="detail-quote">${d.quote}</div>`:''}${d.hint?`<div class="detail-hint">${d.hint}</div>`:''}`;
  for(const[k,c]of Object.entries(cards))c.classList.toggle('active',k===key);
  document.querySelectorAll('.edge').forEach(el=>el.classList.toggle('active',el.dataset.key===key));
  const toast=document.getElementById('toast');toast.textContent=d.tag;toast.classList.add('show');clearTimeout(toast._timeout);toast._timeout=setTimeout(()=>toast.classList.remove('show'),1600);
}showDetail('intro');

// TILT
if(!isTouch&&!reduce){detailEl.addEventListener('mousemove',e=>{const r=detailEl.getBoundingClientRect(),x=e.clientX-r.left,y=e.clientY-r.top,cx=r.width/2,cy=r.height/2;detailEl.style.transform=`perspective(800px) rotateX(${((y-cy)/cy)*-5}deg) rotateY(${((x-cx)/cx)*5}deg)`});detailEl.addEventListener('mouseleave',()=>detailEl.style.transform='perspective(800px) rotateX(0deg) rotateY(0deg)')}
// PARALLAX
if(!isTouch&&!reduce){graphArea.addEventListener('mousemove',e=>{if(animA)return;const r=graphArea.getBoundingClientRect(),x=(e.clientX-r.left)/r.width-.5,y=(e.clientY-r.top)/r.height-.5;for(const[k,card]of Object.entries(cards)){if(getSlot(k)==='top')continue;card.style.transform=`translate(-50%,-50%) translate(${x*8}px,${y*6}px)`}});graphArea.addEventListener('mouseleave',()=>{for(const[k,card]of Object.entries(cards)){if(getSlot(k)==='top')continue;card.style.transform='translate(-50%,-50%)'}})}

// TIMELINE
const tl=document.getElementById('timeline');
phases.forEach((p,i)=>{const el=document.createElement('div');el.className='phase reveal'+(i===0?' open':'');el.innerHTML=`<div class="phase-dot"></div><button class="phase-toggle" aria-expanded="${i===0}"><span class="phase-idx">${p.idx}</span><span class="phase-name">${p.name}</span><span class="phase-jp">${p.jp}</span></button><div class="phase-body"><div class="phase-body-inner"><div class="phase-content"><div class="phase-text">${p.text}</div><div class="phase-img"><img src="${p.img}" loading="lazy" alt="${p.name}"></div></div></div></div>`;tl.appendChild(el);el.querySelector('.phase-toggle').addEventListener('click',()=>{const o=el.classList.toggle('open');el.querySelector('.phase-toggle').setAttribute('aria-expanded',o)})});

// MUSIC — local audio
const bgm=document.getElementById('bgmAudio'),mt=document.getElementById('musicToggle');let mp=false;
bgm.src='./bgm.m4a';bgm.volume=0.45;bgm.loop=true;
async function play(){try{await bgm.play();mp=true;mt.classList.add('playing')}catch(e){}}
play();
function wake(){if(!mp){play();if(mp){document.removeEventListener('click',wake);document.removeEventListener('scroll',wake)}}}
document.addEventListener('click',wake);document.addEventListener('scroll',wake);
mt.addEventListener('click',e=>{e.stopPropagation();mp?(bgm.pause(),mp=false,mt.classList.remove('playing')):play()});

// REVEAL
if(reduce)document.querySelectorAll('.reveal').forEach(el=>el.classList.add('in'));
else{const io=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target)}})},{threshold:.15,rootMargin:'0px 0px -40px 0px'});document.querySelectorAll('.reveal').forEach(el=>io.observe(el))}

// ═══ INTRO SEQUENCE — 樱吹雪缓缓浮现 ═══
const introPlayed=sessionStorage.getItem('oregairu_intro_v2');
const introOverlay=document.getElementById('introOverlay'),introTitle=document.getElementById('introTitle'),introSub=document.getElementById('introSub');
if(!reduce&&!introPlayed){
  // Hide page content behind petals
  document.querySelector('.hero').style.opacity='0';
  document.querySelector('.scene-divider').style.opacity='0';
  document.querySelector('.graph-stage').style.opacity='0';
  for(const[k,card]of Object.entries(cards)){card.style.opacity='0';card.classList.add('intro-fly')}
  stormMode=true;setStormMode(true);

  // 1.5s: title begins to emerge through the dense petals
  setTimeout(()=>{introTitle.classList.add('visible')},1500);
  // 2.5s: subtitle emerges
  setTimeout(()=>{introSub.classList.add('visible')},2500);
  // 4.5s: petals mostly cleared, overlay fades, title fades out
  setTimeout(()=>{
    introOverlay.classList.add('done');
    introTitle.classList.add('done');
    introSub.style.opacity='0';introSub.style.transition='opacity 1.5s ease-out';
    // Page content fades in
    document.querySelector('.hero').style.transition='opacity 1.2s ease-out .2s';document.querySelector('.hero').style.opacity='1';
    document.querySelector('.scene-divider').style.transition='opacity .8s ease-out .5s';document.querySelector('.scene-divider').style.opacity='1';
    document.querySelector('.graph-stage').style.transition='opacity .8s ease-out .8s';document.querySelector('.graph-stage').style.opacity='1';
    // Cards fly in staggered
    const slotKeys=[slot.top,slot.bl,slot.br];
    slotKeys.forEach((key,i)=>{
      setTimeout(()=>{cards[key].style.opacity='1'},400+i*350);
      setTimeout(()=>{cards[key].classList.add('done')},1300+i*350);
    });
  },4500);
  // 6.5s: petals thin to normal
  setTimeout(()=>{setStormMode(false)},6500);
  // 7.5s: final cleanup
  setTimeout(()=>{
    introOverlay.style.display='none';introTitle.style.display='none';introSub.style.display='none';
    sessionStorage.setItem('oregairu_intro_v2','1');
  },7500);
}else{
  // Already played or reduced motion — skip intro
  setStormMode(false);stormMode=false;
  introOverlay.style.display='none';introTitle.style.display='none';introSub.style.display='none';
  document.querySelector('.hero').style.opacity='1';
  document.querySelector('.scene-divider').style.opacity='1';
  document.querySelector('.graph-stage').style.opacity='1';
  for(const[k,card]of Object.entries(cards)){card.style.opacity='1';card.classList.remove('intro-fly','done')}
}

layoutCards();addEventListener('resize',()=>{if(!animA)layoutCards()});
document.querySelectorAll('.edge-line').forEach(ln=>{ln.style.strokeDasharray=String(ln.getTotalLength());ln.style.strokeDashoffset='0';ln.style.opacity='1'});
</script>
</body>
